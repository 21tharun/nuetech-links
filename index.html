<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuetech IoT</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px;
    }
    .card {
      background: white; border-radius: 20px; padding: 40px 32px;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #3B82F6, #60A5FA);
      border-radius: 20px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 40px; height: 40px; fill: white; }
    h1 { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p  { font-size: 14px; color: #64748b; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10
        10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <h1>Nuetech IoT</h1>
    <p>Smart solar water heater controller.<br/>Scan your device QR code to get started.</p>
  </div>
</body>
</html>
